# Supabase project configuration
# 主に Edge Function ごとの verify_jwt 設定を保持。
# 詳細: https://supabase.com/docs/reference/cli/config

project_id = "yytxgxlhgotscwztlsqj"

# ─────────────────────────────────────────────────────
# Town Talk (C-1.3): Roblox 等から Authorization: Bearer
# ${ROBLOX_API_KEY} で呼ばれるため、ゲートウェイの JWT 検証を
# 無効化し、関数内で独自に Bearer 比較を実施する。
# ─────────────────────────────────────────────────────
[functions.world-talk-scenario-fetch]
verify_jwt = false

[functions.world-talk-submit]
verify_jwt = false

